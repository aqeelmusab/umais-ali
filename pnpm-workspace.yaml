packages:
  - "."

# Force the patched esbuild (GHSA-gv7w-rqvm-qjhr, GHSA-g7r4-m6w7-qqqr).
# tsx pulls esbuild ~0.28.0, which 0.28.1 satisfies.
# Force the patched path-to-regexp (GHSA-9wv6-86v2-598j, ReDoS), pulled in
# transitively by @astrojs/vercel -> @vercel/routing-utils.
overrides:
  esbuild: "~0.28.1"
  path-to-regexp@<6.3.0: "^6.3.0"

allowBuilds:
  "@biomejs/biome": true
  "@parcel/watcher": true
  esbuild: true
  simple-git-hooks: true

minimumReleaseAgeExclude:
  - "@biomejs/*"
  - "@types/node@24.13.3"
  - resend@6.17.2
  - tsx@4.23.1
  - '@astrojs/markdown-satteri@0.3.4'
  - astro@7.0.8 || 7.0.9
  - '@astrojs/vercel@11.0.3'
